name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install lsof (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y lsof

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets

      - name: Build binaries (required by e2e tests)
        run: cargo build -p mcp-tool-bridge -p mcp-tool-bridge-hook

      - name: Unit tests
        run: cargo test --lib --bins --no-fail-fast

      - name: Doc tests
        run: cargo test --doc --no-fail-fast

      - name: E2E tests (default features — no real infra)
        run: cargo test --test e2e --no-fail-fast

      - name: Hook tests (unit + e2e)
        run: cargo test -p mcp-tool-bridge-hook --no-fail-fast

      - name: Plugin smoke test (validate plugin manifest JSON)
        shell: bash
        run: |
          python3 -c "
          import json, sys
          for f in ['plugin/.claude-plugin/plugin.json', 'plugin/.mcp.json', 'plugin/hooks/hooks.json']:
              with open(f) as fh:
                  json.load(fh)
              print(f'OK: {f}')
          "

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-coverage-
      - name: Install lsof
        run: sudo apt-get install -y lsof
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Build binary
        run: cargo build -p mcp-tool-bridge
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info --tests --no-fail-fast
      - name: Coverage summary
        run: cargo llvm-cov report --summary-only

  build-release:
    name: Release build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-release-
      - name: cargo build --release
        run: cargo build --release -p mcp-tool-bridge -p mcp-tool-bridge-hook
      - name: Smoke test (--list-tools)
        run: ./target/release/mcp-tool-bridge --list-tools
      - name: Smoke test (hook off-mode is silent)
        run: |
          echo '{"tool_name":"Bash","tool_input":{"command":"ls"}}' \
            | MCP_BRIDGE_HOOK_MODE=off ./target/release/mcp-tool-bridge-hook
