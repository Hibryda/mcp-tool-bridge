name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install lsof (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y lsof

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets

      - name: Build binary (required by e2e tests)
        run: cargo build -p mcp-tool-bridge

      - name: Unit tests
        run: cargo test --lib --bins --no-fail-fast

      - name: E2E tests (default features — no real infra)
        run: cargo test --test e2e --no-fail-fast

  build-release:
    name: Release build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ubuntu-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-cargo-release-
      - name: cargo build --release
        run: cargo build --release -p mcp-tool-bridge
      - name: Smoke test (--list-tools)
        run: ./target/release/mcp-tool-bridge --list-tools
